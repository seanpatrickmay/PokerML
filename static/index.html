<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Poker — CFR Solver</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <main id="app">
    <!-- LEFT: Game Panel -->
    <section id="game-panel" aria-label="Poker table">
      <div id="settings-bar" role="toolbar" aria-label="Game settings">
        <label for="num-players-select">Players</label>
        <select id="num-players-select">
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5">5</option>
          <option value="6" selected>6</option>
          <option value="7">7</option>
          <option value="8">8</option>
          <option value="9">9</option>
        </select>
        <label for="position-select">Position</label>
        <select id="position-select"></select>
        <button id="new-hand-btn" type="button" aria-label="Deal new hand">New Hand</button>
      </div>

      <div id="table">
        <div id="table-felt" role="img" aria-label="Poker table">
          <div id="board-area">
            <div id="board" class="hand" aria-label="Community cards"></div>
            <div id="pot-display" aria-live="polite">Pot: 1.5</div>
            <div id="street-display">Preflop</div>
          </div>
          <div id="dealer-btn" aria-label="Dealer button">D</div>
        </div>
      </div>

      <!-- Info bar: equity, pot odds, SPR -->
      <div id="info-bar" class="hidden">
        <div id="equity-display" aria-label="Hand equity">
          <span id="equity-label">Equity</span>
          <div id="equity-track"><div id="equity-fill"></div></div>
          <span id="equity-text">—</span>
        </div>
        <div id="pot-info">
          <span id="pot-info-text"></span>
        </div>
      </div>

      <div id="live-solver" class="hidden" aria-label="Solver recommendation">
        <div id="live-solver-label">Live Solver</div>
        <div id="live-solver-bars"></div>
        <div id="live-solver-meta"></div>
      </div>

      <div id="actions" role="toolbar" aria-label="Player actions">
        <!-- buttons rendered dynamically by app.js -->
      </div>

      <div id="result-banner" class="hidden" role="alert" aria-live="assertive"></div>

      <div id="log-box" aria-label="Hand history">
        <h3 id="log-head">Hand History</h3>
        <div id="log" role="log" aria-live="polite" aria-relevant="additions"></div>
      </div>

      <div id="stats" aria-label="Session statistics">
        Hands: <span id="stat-hands">0</span> &nbsp;|&nbsp;
        P/L: <span id="stat-profit">0.0</span> BB
      </div>
    </section>

    <!-- RIGHT: Strategy Panel -->
    <section id="strat-panel" aria-label="Strategy analysis">
      <div id="strat-header">
        <h2>CFR Strategy</h2>
        <div id="strat-context" aria-live="polite"></div>
      </div>

      <div id="range-grid-wrap" role="grid" aria-label="Hand range grid">
        <div class="grid-hdr corner"></div>
        <div class="grid-hdr col-h" role="columnheader">A</div><div class="grid-hdr col-h" role="columnheader">K</div>
        <div class="grid-hdr col-h" role="columnheader">Q</div><div class="grid-hdr col-h" role="columnheader">J</div>
        <div class="grid-hdr col-h" role="columnheader">T</div><div class="grid-hdr col-h" role="columnheader">9</div>
        <div class="grid-hdr col-h" role="columnheader">8</div><div class="grid-hdr col-h" role="columnheader">7</div>
        <div class="grid-hdr col-h" role="columnheader">6</div><div class="grid-hdr col-h" role="columnheader">5</div>
        <div class="grid-hdr col-h" role="columnheader">4</div><div class="grid-hdr col-h" role="columnheader">3</div>
        <div class="grid-hdr col-h" role="columnheader">2</div>
        <div id="range-grid"></div>
      </div>

      <div id="legend" aria-label="Color legend">
        <span class="leg" style="--c:#ef4444">Fold</span>
        <span class="leg" style="--c:#22c55e">Check</span>
        <span class="leg" style="--c:#3b82f6">Call</span>
        <span class="leg" style="--c:#f97316">Small Bet</span>
        <span class="leg" style="--c:#eab308">Pot Bet</span>
        <span class="leg" style="--c:#f59e0b">Overbet</span>
        <span class="leg" style="--c:#a855f7">All In</span>
      </div>

      <div id="detail" class="hidden">
        <h3 id="detail-title"></h3>
        <div id="detail-meta"></div>
        <div id="detail-bars"></div>
        <div id="detail-combos"></div>
      </div>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
